mutation UpsertUser($id: String!, $email: String!, $name: String!, $createdAt: Timestamp!) @auth(level: NO_ACCESS) {
  user_upsert(
    data: {
      id: $id          
      email: $email
      name: $name
      createdAt: $createdAt
    }
  )
}


mutation InsertQuizAttempt($userId: String!, $topicIndex: Int!, $score: Float!, $totalQuestion: Int!, $correctAnswer: Int!, $difficulty: Int!, $createdAt: Timestamp!) @auth(level: NO_ACCESS) {
  quizAttempt_insert(data: {
    user: { id: $userId }
    topicIndex: $topicIndex
    score: $score
    totalQuestion: $totalQuestion
    correctAnswer: $correctAnswer
    difficulty: $difficulty
    createdAt: $createdAt
  })
}


mutation UpsertPrediction($userId: String!, $topicIndex: Int!, $predictedLevel: Int!, $confidence: Float!, $updatedAt: Timestamp!) @auth(level: NO_ACCESS) {
  prediction_upsert(data: {  
    user: { id: $userId }
    topicIndex: $topicIndex
    predictedLevel: $predictedLevel
    confidence: $confidence
    updatedAt: $updatedAt
  })
}


mutation UpsertLearningPath($userId: String!, $currentTopic: Int!, $recommendedDifficulty: Int!, $nextTopic: Int!, $updatedAt: Timestamp!) @auth(level: NO_ACCESS) {
  learningPath_upsert(data: {  
    user: { id: $userId }
    currentTopic: $currentTopic
    recommendedDifficulty: $recommendedDifficulty
    nextTopic: $nextTopic
    updatedAt: $updatedAt
  })
}

mutation UpsertTopicProfile(
  $userId: String!,
  $topic1: Int!, $topic2: Int!, $topic3: Int!, $topic4: Int!,
  $topic5: Int!, $topic6: Int!, $topic7: Int!, $topic8: Int!,
  $topic9: Int!, $topic10: Int!, $topic11: Int!, $topic12: Int!,
  $updatedAt: Timestamp!
) @auth(level: NO_ACCESS) {
  topicProfile_upsert(data: {  
    user: { id: $userId }      
    topic1: $topic1
    topic2: $topic2
    topic3: $topic3
    topic4: $topic4
    topic5: $topic5
    topic6: $topic6
    topic7: $topic7
    topic8: $topic8
    topic9: $topic9
    topic10: $topic10
    topic11: $topic11
    topic12: $topic12
    updatedAt: $updatedAt
  })
}

query GetUserProfile($userId: String!) @auth(level: NO_ACCESS) {
  topicProfile(key: { userId: $userId }) { 
    topic1
    topic2
    topic3
    topic4
    topic5
    topic6
    topic7
    topic8
    topic9
    topic10
    topic11
    topic12
    updatedAt
  }
}

query GetQuizAttempts($userId: String!) @auth(level: NO_ACCESS) {
  quizAttempts(where: { userId: { eq: $userId } }) {
    id
    topicIndex
    score
    totalQuestion
    correctAnswer
    difficulty
    createdAt
  }
}
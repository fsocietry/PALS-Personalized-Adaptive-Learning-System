type User @table(key: "id") {
  id: String!
  email: String!
  name: String!
  createdAt: Timestamp!
}

type TopicProfile @table(key: ["user"]) {
  user: User!
  topic1: Int!
  topic2: Int!
  topic3: Int!
  topic4: Int!
  topic5: Int!
  topic6: Int!
  topic7: Int!
  topic8: Int!
  topic9: Int!
  topic10: Int!
  topic11: Int!
  topic12: Int!
  updatedAt: Timestamp!
}

type Prediction @table(key: ["user", "topicIndex"]) {
  user: User!
  topicIndex: Int!
  predictedLevel: Int!
  confidence: Float!
  updatedAt: Timestamp!
}

type LearningPath @table(key: ["user"]) {
  user: User!
  currentTopic: Int!
  recommendedDifficulty: Int!
  nextTopic: Int!
  updatedAt: Timestamp!
}

type QuizAttempt @table {
  user: User!
  topicIndex: Int!
  score: Float!
  totalQuestion: Int!
  correctAnswer: Int!
  difficulty: Int!
  createdAt: Timestamp!
}